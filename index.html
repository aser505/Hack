<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy Hack Game - كود برق المطوّر</title>
    <style>
        body {
            background-color: #050505; color: #00ff41; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }

        #game-container {
            text-align: center; width: 90%; max-width: 400px; padding: 25px;
            background: #0a0a0a; border: 2px solid #00ff41; position: relative;
            min-height: 550px; display: flex; flex-direction: column; justify-content: center;
        }

        .hidden { display: none !important; }
        .disabled { opacity: 0.3; pointer-events: none; }
        
        #timer-box { font-size: 2.8rem; color: #ff1f1f; font-weight: bold; margin-bottom: 10px; }
        #status-msg { height: 35px; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }

        /* Stages Styles */
        .grid-board { display: grid; gap: 8px; grid-template-columns: repeat(5, 1fr); margin-bottom: 20px; }
        .tile { aspect-ratio: 1/1; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; }
        .tile.active { background: #00ff41 !important; }
        .tile.correct { background: #0088ff; }
        .tile.wrong { background: #ff0000; }

        .guess-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .digit-box { width: 50px; height: 70px; background: #111; border: 2px solid #333; font-size: 2rem; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .match-exact { background: #00c853 !important; color: #000; }
        .match-exist { background: #ff6d00 !important; color: #000; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { padding: 18px; background: #111; border: 1px solid #00ff41; color: #00ff41; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 280px; margin: 20px auto; }
        .node { height: 100px; background: #111; border: 3px solid #333; border-radius: 15px; cursor: pointer; }
        .node.flash { background: #fff !important; }
        .node.active { background: #00ff41 !important; }

        /* Stage 4 Styles */
        #lock-area { position: relative; width: 280px; height: 280px; margin: 10px auto; background: #0d0d0d; border-radius: 50%; border: 1px solid #1a1a1a; }
        .layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        .l-size-1 { width: 70px; height: 70px; } .l-size-2 { width: 140px; height: 140px; } .l-size-3 { width: 210px; height: 210px; } .l-size-4 { width: 280px; height: 280px; }
        .arc { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 11px solid transparent; box-sizing: border-box; top: 0; left: 0; transform-origin: center center; }
        .arc-wide { border-right-color: inherit; border-width: 13px; }
        .dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(255,255,255,0.2); z-index: 15; }
        
        .is-waiting .arc { border-top-color: #555 !important; }
        .is-waiting .arc-wide { border-right-color: #555 !important; }
        .is-waiting .dot { background: #777 !important; }

        .action-btn { width: 100%; padding: 18px; background: #00ff41; color: #000; border: none; font-weight: bold; font-size: 1.2rem; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .secondary-btn { background: #111; border: 1px solid #00ff41; color: #00ff41; }
        
        #fail-overlay, #success-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="timer-box">0.0s</div>
    <div id="status-msg">READY</div>

    <div id="fail-overlay" class="hidden">
        <h1 style="color:red">MISSION FAILED</h1>
        <p id="fail-msg" style="color:#fff; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem;"></p>
        <button class="action-btn" style="width:auto; padding: 10px 40px; background:red; color:white" onclick="resetToStageOne()">INITIALIZE NEW ATTEMPT</button>
    </div>

    <div id="success-overlay" class="hidden">
        <h1 id="success-title" style="color:#00ff41">STAGE CLEAR</h1>
        <p id="success-desc" style="color:#fff; margin-bottom: 10px;"></p>
        <button id="next-btn" class="action-btn" style="width:auto; padding: 10px 40px;" onclick="goToNextStage()">PROCEED TO NEXT STAGE</button>
        <button id="restart-btn" class="action-btn hidden" style="width:auto; padding: 10px 40px;" onclick="resetToStageOne()">RE-ENTER THE MATRIX</button>
    </div>

    <div id="s1-container">
        <h2>MEMORY GAME</h2>
        <div id="grid-board" class="grid-board disabled"></div>
        <button id="s1-btn" class="action-btn" onclick="startS1()">START GAME</button>
    </div>

    <div id="s2-container" class="hidden">
        <h2>GUESS THE CODE</h2>
        <div class="guess-row">
            <div class="digit-box" id="d0"></div><div class="digit-box" id="d1"></div><div class="digit-box" id="d2"></div><div class="digit-box" id="d3"></div>
        </div>
        <div class="numpad" id="numpad-s2"></div>
    </div>

    <div id="s3-container" class="hidden">
        <h2>FOLLOW PATTERN</h2>
        <div id="pattern-grid" class="pattern-grid disabled">
            <div class="node" id="node-0" onclick="handleNodeClick(0)"></div>
            <div class="node" id="node-1" onclick="handleNodeClick(1)"></div>
            <div class="node" id="node-2" onclick="handleNodeClick(2)"></div>
            <div class="node" id="node-3" onclick="handleNodeClick(3)"></div>
        </div>
        <button id="s3-btn" class="action-btn" onclick="startS3()">START LEVEL</button>
        <div id="s3-progress" class="hidden" style="margin-top: 15px;">LEVEL: <span id="sync-val" style="color: #00ff41;">1 / 3</span></div>
    </div>

    <div id="s4-container" class="hidden">
        <h2>FINAL LOCK</h2>
        <p style="font-size: 1.1rem; color: #00ff41; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px;">SYNC BALLS TO ARCS</p>
        <div id="lock-wrapper" class="is-waiting">
            <div id="lock-area">
                <div id="l1-arcs" class="layer l-size-1"></div><div id="l2-arcs" class="layer l-size-2"></div><div id="l3-arcs" class="layer l-size-3"></div><div id="l4-arcs" class="layer l-size-4"></div>
                <div id="dot-layer-1" class="layer l-size-1"></div><div id="dot-layer-2" class="layer l-size-2"></div><div id="dot-layer-3" class="layer l-size-3"></div><div id="dot-layer-4" class="layer l-size-4"></div>
            </div>
        </div>
        <div id="s4-ui-elements">
            <div style="display:flex; gap:10px;">
                <button id="s4-left" class="action-btn secondary-btn" onclick="rotateLayerS4(-1)">LEFT</button>
                <button id="s4-right" class="action-btn secondary-btn" onclick="rotateLayerS4(1)">RIGHT</button>
            </div>
            <button id="s4-init-btn" class="action-btn" onclick="activateS4()">START SYSTEM</button>
            <button id="s4-confirm-btn" class="action-btn hidden" style="background:#fff" onclick="checkUnlock4()">CONFIRM</button>
        </div>
    </div>
</div>

<script>
    let currentStage = 1, timerInterval;
    let activeTiles = [], userChoices = [], secretCode = "", currentGuess = "", isProcessing = false;
    let timerStarted = false, level = 1;
    let currentLayer = 1, currentSteps = { 1: 0, 2: 0, 3: 0, 4: 0 };
    const coreColors = ['#03a9f4', '#ffc107', '#ff0000']; 

    const timerBox = document.getElementById('timer-box');
    const statusMsg = document.getElementById('status-msg');

    window.onload = () => { createGrid(); createNumpad(); };

    function createGrid() {
        const board = document.getElementById('grid-board');
        board.innerHTML = '';
        for(let i=0; i<25; i++) {
            let t = document.createElement('div'); t.className='tile'; t.id = `tile-${i}`;
            t.onclick = () => handleTileClick(i); board.appendChild(t);
        }
    }

    function createNumpad() {
        const pad = document.getElementById('numpad-s2');
        if (!pad) return; pad.innerHTML = '';
        for(let i=1; i<=9; i++) {
            let b = document.createElement('button'); b.className='num-btn'; b.innerText=i;
            b.onclick = () => pressNum(i.toString()); pad.appendChild(b);
        }
        let b0 = document.createElement('button'); b0.className='num-btn'; b0.innerText='0';
        b0.style.gridColumn = 'span 3'; b0.onclick = () => pressNum('0'); pad.appendChild(b0);
    }

    function showSuccess() {
        isProcessing = true; clearInterval(timerInterval);
        statusMsg.innerText = "SUCCESS!";
        
        const overlay = document.getElementById('success-overlay');
        const title = document.getElementById('success-title');
        const desc = document.getElementById('success-desc');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');

        if (currentStage === 4) {
            title.innerText = "SYSTEM FULLY BREACHED";
            title.style.color = "#00ff41";
            desc.innerText = "WELCOME, MASTER HACKER. ALL DATA ACCESSIBLE.";
            nextBtn.classList.add('hidden');
            restartBtn.classList.remove('hidden');
        } else {
            title.innerText = "STAGE CLEAR";
            desc.innerText = "SECURITY LAYER BYPASSED.";
            nextBtn.classList.remove('hidden');
            restartBtn.classList.add('hidden');
        }
        
        setTimeout(() => { overlay.classList.remove('hidden'); }, 800);
    }

    function goToNextStage() {
        document.getElementById('success-overlay').classList.add('hidden');
        if (currentStage === 1) initS2();
        else if (currentStage === 2) initS3();
        else if (currentStage === 3) initS4();
    }

    function resetToStageOne() { location.reload(); }

    // Logics
    function startS1() {
        document.getElementById('s1-btn').classList.add('hidden');
        document.getElementById('grid-board').classList.remove('disabled');
        activeTiles = []; 
        while(activeTiles.length < 8) { let r = Math.floor(Math.random()*25); if(!activeTiles.includes(r)) activeTiles.push(r); }
        activeTiles.forEach(idx => document.getElementById(`tile-${idx}`).classList.add('active'));
        setTimeout(() => {
            activeTiles.forEach(idx => document.getElementById(`tile-${idx}`).classList.remove('active'));
            statusMsg.innerText = "FIND THEM!"; startTimer(7.0);
        }, 1500);
    }

    function handleTileClick(i) {
        if(statusMsg.innerText !== "FIND THEM!" || isProcessing) return;
        if(activeTiles.includes(i)) {
            if(!userChoices.includes(i)) {
                userChoices.push(i); document.getElementById(`tile-${i}`).classList.add('correct');
                if(userChoices.length === activeTiles.length) showSuccess();
            }
        } else failGame();
    }

    function initS2() {
        currentStage = 2; timerStarted = false; isProcessing = false;
        document.getElementById('s1-container').classList.add('hidden');
        document.getElementById('s2-container').classList.remove('hidden');
        secretCode = Math.floor(Math.random()*10000).toString().padStart(4, '0');
        statusMsg.innerText = "GUESS CODE"; startTimer(20.0, true); 
    }

    function pressNum(n) {
        if(isProcessing || currentStage !== 2) return;
        if(currentGuess.length < 4) {
            currentGuess += n;
            for(let i=0; i<4; i++) document.getElementById(`d${i}`).innerText = currentGuess[i] || "";
            if(currentGuess.length === 4) {
                isProcessing = true;
                let sArr = secretCode.split(''), gArr = currentGuess.split(''), exact = 0;
                let boxes = [document.getElementById('d0'),document.getElementById('d1'),document.getElementById('d2'),document.getElementById('d3')];
                for(let i=0; i<4; i++) if(gArr[i] === sArr[i]) { boxes[i].classList.add('match-exact'); sArr[i]=null; gArr[i]='X'; exact++; }
                for(let i=0; i<4; i++) if(gArr[i]!=='X' && sArr.includes(gArr[i])) { boxes[i].classList.add('match-exist'); sArr[sArr.indexOf(gArr[i])]=null; }
                if(exact === 4) showSuccess();
                else setTimeout(() => { currentGuess=""; boxes.forEach(b=>{b.innerText=""; b.className="digit-box";}); isProcessing=false; }, 800);
            }
        }
    }

    function initS3() {
        currentStage = 3; isProcessing = false;
        document.getElementById('s2-container').classList.add('hidden');
        document.getElementById('s3-container').classList.remove('hidden');
        timerBox.innerText = "20.0s";
    }

    function startS3() {
        document.getElementById('s3-btn').classList.add('hidden');
        document.getElementById('pattern-grid').classList.remove('disabled');
        document.getElementById('s3-progress').classList.remove('hidden');
        startTimer(20.0); nextPatternLevel();
    }

    function nextPatternLevel() {
        isProcessing = true; userPattern = []; pattern = [];
        let count = [3, 4, 5][level-1];
        for(let i=0; i<count; i++) pattern.push(Math.floor(Math.random() * 4));
        document.getElementById('sync-val').innerText = `${level} / 3`;
        playPattern();
    }

    async function playPattern() {
        statusMsg.innerText = "WATCH..."; await new Promise(r => setTimeout(r, 600));
        for (let nodeId of pattern) {
            const node = document.getElementById(`node-${nodeId}`);
            node.classList.add('flash'); await new Promise(r => setTimeout(r, 500));
            node.classList.remove('flash'); await new Promise(r => setTimeout(r, 300));
        }
        statusMsg.innerText = "REPEAT!"; isProcessing = false;
    }

    function handleNodeClick(id) {
        if (isProcessing || currentStage !== 3) return;
        const node = document.getElementById(`node-${id}`);
        node.classList.add('active'); setTimeout(() => node.classList.remove('active'), 200);
        if (id === pattern[userPattern.length]) {
            userPattern.push(id);
            if (userPattern.length === pattern.length) {
                if (level === 3) showSuccess();
                else { level++; isProcessing = true; setTimeout(nextPatternLevel, 1000); }
            }
        } else failGame();
    }

    function initS4() {
        currentStage = 4; isProcessing = false;
        document.getElementById('s3-container').classList.add('hidden');
        document.getElementById('s4-container').classList.remove('hidden');
        setupLockS4(); timerBox.innerText = "15.0s";
    }

    function activateS4() {
        document.getElementById('lock-wrapper').classList.remove('is-waiting');
        document.getElementById('s4-left').classList.remove('disabled');
        document.getElementById('s4-right').classList.remove('disabled');
        document.getElementById('s4-init-btn').classList.add('hidden');
        document.getElementById('s4-confirm-btn').classList.remove('hidden');
        startTimer(15.0);
    }

    function setupLockS4() {
        for (let l = 1; l <= 4; l++) {
            const arcContainer = document.getElementById(`l${l}-arcs`);
            const dotContainer = document.getElementById(`dot-layer-${l}`);
            const pattern = (l===1)?[coreColors[0],coreColors[1],coreColors[2],coreColors[1]]:(l===2)?[coreColors[2],coreColors[0],coreColors[1],coreColors[0],coreColors[2]]:(l===3)?[coreColors[0],coreColors[0],coreColors[1],coreColors[2],coreColors[1],coreColors[2]]:[coreColors[2],coreColors[1],coreColors[2],coreColors[0],coreColors[0],coreColors[1]];
            arcContainer.innerHTML = ''; dotContainer.innerHTML = '';
            pattern.forEach((color, i) => {
                const currentAngle = i * (360/pattern.length);
                const arc = document.createElement('div'); arc.className = 'arc';
                arc.style.transform = `rotate(${currentAngle}deg)`; arc.style.borderTopColor = color;
                if (i < pattern.length-1 && pattern[i] === pattern[i+1]) { arc.classList.add('arc-wide'); arc.style.borderRightColor = color; }
                arcContainer.appendChild(arc);
                const dot = document.createElement('div'); dot.className = 'dot'; dot.style.background = color;
                const rad = (currentAngle - 90) * (Math.PI / 180);
                dot.style.left = (50+(Math.cos(rad)*50))+'%'; dot.style.top = (50+(Math.sin(rad)*50))+'%';
                dotContainer.appendChild(dot);
            });
            currentSteps[l] = Math.floor(Math.random() * (pattern.length - 1)) + 1;
        }
        updateVisualsS4();
    }

    function rotateLayerS4(dir) {
        if (isProcessing || document.getElementById('lock-wrapper').classList.contains('is-waiting')) return;
        const patterns = [[4],[5],[6],[6]]; // Lengths
        const count = patterns[currentLayer-1];
        currentSteps[currentLayer] = (currentSteps[currentLayer] + dir + count) % count;
        updateVisualsS4();
    }

    function updateVisualsS4() {
        const steps = [90, 72, 60, 60];
        for (let l = 1; l <= 4; l++) {
            const el = document.getElementById(`dot-layer-${l}`);
            el.style.transform = `translate(-50%, -50%) rotate(${currentSteps[l] * steps[l-1]}deg)`;
            el.style.boxShadow = (l === currentLayer && !document.getElementById('lock-wrapper').classList.contains('is-waiting')) ? "0 0 15px #00ff41" : "none";
        }
    }

    function checkUnlock4() {
        if (isProcessing) return;
        if (currentSteps[currentLayer] === 0) {
            const arcs = document.getElementById(`l${currentLayer}-arcs`).getElementsByClassName('arc');
            for(let a of arcs) a.classList.add('success-grey');
            if (currentLayer < 4) { currentLayer++; statusMsg.innerText = `LAYER ${currentLayer-1} OPEN`; updateVisualsS4(); } 
            else { showSuccess(); }
        } else failGame();
    }

    function startTimer(s, skipUpdate) {
        clearInterval(timerInterval); let time = s;
        if(!skipUpdate) timerBox.innerText = time.toFixed(1) + "s";
        timerInterval = setInterval(() => {
            time -= 0.1; timerBox.innerText = Math.max(0, time).toFixed(1) + "s";
            if(time <= 0) failGame();
        }, 100);
    }

    function failGame() {
        isProcessing = true; clearInterval(timerInterval);
        statusMsg.innerText = "FAILED!"; statusMsg.style.color = "red";
        const msgs = ["SYSTEM BREACH DETECTED!","ACCESS DENIED!","CONNECTION LOST!","CRITICAL ERROR: HACK FAILED."];
        document.getElementById('fail-msg').innerText = msgs[Math.floor(Math.random() * msgs.length)];
        setTimeout(() => { document.getElementById('fail-overlay').classList.remove('hidden'); }, 500);
    }
</script>
</body>
</html>
